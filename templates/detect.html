<!DOCTYPE html>
<html>
<head>
    <title>Live Detection - Algorithm 3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0f; color: #fff; padding: 40px; }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { color: #d4af37; margin-bottom: 10px; }
        .back { color: #6e6e80; text-decoration: none; display: inline-block; margin-bottom: 30px; }
        .form-card { background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 16px; padding: 30px; }
        label { display: block; color: #a0a0b0; margin: 20px 0 8px; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            background: #12121a;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        input:focus { outline: none; border-color: #d4af37; }
        button {
            width: 100%;
            padding: 14px;
            background: #d4af37;
            color: #0a0a0f;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 25px;
            cursor: pointer;
        }
        .info { color: #6e6e80; font-size: 12px; margin-top: 15px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back">← Back to Home</a>
        <h1>Live Detection</h1>

        <div class="form-card">
            <form method="POST" action="/detect">
                <label>Monitoring Duration (seconds)</label>
                <input type="number" name="duration" value="30" min="10" max="300">

                <label>Window Size (seconds)</label>
                <input type="number" name="window_size" value="5" min="1" max="60">

                <button type="submit">Start Detection</button>
            </form>
            <p class="info">
                Monitors network traffic in real-time.<br>
                Correlates with system health metrics.<br>
                Triggers alerts when thresholds are exceeded.
            </p>
        </div>
    </div>
</body>
</html>
